# deadline-stall-detector config
# Copy to config.yaml and adjust values.
# config.yaml is gitignored — never commit real credentials.

deadline:
  host: localhost
  port: 8081
  repo_path: "C:\\DeadlineRepository10"
  auth:
    user: ""
    password: ""

detector:
  poll_interval: 60
  stall_threshold_polls: 5
  watch_statuses:
    - Rendering
  blacklist_after: 3
  blacklist_pools:
    - vray_farm
    - maya_farm

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  min_level: warning

logging:
  level: INFO
  file: "logs/stall_detector.log"
