# Deadline WebService connection
deadline:
  host: localhost
  port: 8082
  repo_path: C:\DeadlineRepository10

# Stall detection settings
monitor:
  poll_interval_sec: 60
  stall_threshold_min: 20
  log_level: INFO

# Telegram notifications (optional)
# Set values here OR export as env vars:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
telegram:
  bot_token: ""
  chat_id: ""
